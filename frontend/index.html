<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="KYB counterparty due-diligence: ownership graph, beneficial owners, and adverse-media background from free open data, with sources."
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0f0f11" />
    <title>KYB — Counterparty Due Diligence</title>
    <!-- Resolve the theme before paint so there's no flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("kyb-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
