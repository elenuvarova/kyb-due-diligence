<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1a1a1f"/>
  <!-- Graph edges -->
  <line x1="16" y1="11" x2="9" y2="22" stroke="#4a3d70" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="11" x2="23" y2="22" stroke="#4a3d70" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Root node (company being investigated) -->
  <rect x="11" y="6" width="10" height="8" rx="2" fill="#a78bfa"/>
  <!-- Child nodes (owners) -->
  <rect x="4" y="20" width="10" height="7" rx="2" fill="#6d4fad"/>
  <rect x="18" y="20" width="10" height="7" rx="2" fill="#6d4fad"/>
</svg>
