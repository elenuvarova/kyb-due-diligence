# Web service only. Render's free Postgres is not a durable free option, so bring your own
# free hosted Postgres (e.g. Neon — free, no expiry) and set DATABASE_URL in the Render
# dashboard. `sync: false` makes Render prompt for it on deploy and keep it secret.
services:
  - type: web
    name: kyb-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
